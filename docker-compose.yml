version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: cc_postgres_db

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: spring_admin
      POSTGRES_PASSWORD: password123

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: